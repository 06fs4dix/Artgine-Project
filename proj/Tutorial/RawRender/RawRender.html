<!DOCTYPE html>
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover' />

<link rel='stylesheet' href='../../../artgine/external/legacy/bootstrap-5.3.3-dist/css/bootstrap.min.css'>
<script src='../../../artgine/external/legacy/popper/poper.min.js'></script>
<script src='../../../artgine/external/legacy/bootstrap-5.3.3-dist/js/bootstrap.min.js'></script>

<script>
let SERVER_BASE='http://localhost:8050/Artgine/proj/Tutorial/RawRender/RawRender.html';
const isElectron =/Electron/i.test(navigator.userAgent) ||(typeof window !== 'undefined' &&typeof window.process === 'object' &&!!window.process.versions?.electron);
if (location.protocol == 'file:' && isElectron==false){
	const page = (location.href.split('/').pop() || 'index.html').replace(/\?.*$/, '');
	const target = new URL(page, SERVER_BASE).toString();
	fetch(target, {method: 'GET',mode: 'cors',cache: 'no-store',redirect: 'manual'}).then(()=>{
	alert('Local Start Redirection!');
	location.replace(target);
	}).catch(() => {    alert('Please run the web server! [npm run start_web]');  });
}</script>

<script type='module' src='RawRender.js'></script>
